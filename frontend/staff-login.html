<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login – Bennett University Lost & Found</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --red: #C8102E; --dark: #1A1A2E; --white: #FFFFFF; --text: #2c2c2c; --muted: #888; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
    background-image: radial-gradient(ellipse at 80% 50%, rgba(200,16,46,0.12) 0%, transparent 60%);
  }
  .logo-area { text-align: center; margin-bottom: 36px; }
  .logo-text { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; color: var(--white); letter-spacing: 3px; }
  .logo-sub { font-size: 0.8rem; color: var(--red); letter-spacing: 4px; text-transform: uppercase; font-weight: 600; margin-top: 4px; }
  .badge { display: inline-block; background: var(--red); color: white; font-size: 0.7rem; padding: 2px 10px; border-radius: 20px; letter-spacing: 1px; margin-top: 8px; font-weight: 600; }
  .login-card { background: var(--white); border-radius: 20px; padding: 40px 36px; box-shadow: 0 24px 80px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
  .login-card h2 { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; color: var(--dark); letter-spacing: 2px; margin-bottom: 4px; }
  .login-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 6px; letter-spacing: 0.5px; }
  input[type="text"], input[type="password"] { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--red); }
  .btn-primary { width: 100%; padding: 13px; background: var(--red); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; margin-top: 8px; transition: background 0.2s; font-family: 'DM Sans', sans-serif; }
  .btn-primary:hover { background: #a50d24; }
  .back-link { display: block; text-align: center; margin-top: 16px; color: rgba(255,255,255,0.6); font-size: 0.85rem; cursor: pointer; text-decoration: underline; }
  .back-link:hover { color: white; }
  .error-msg { background: #ffeaea; color: var(--red); border-left: 3px solid var(--red); padding: 10px 12px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
  .divider { text-align: center; margin: 14px 0 6px; font-size: 0.78rem; color: var(--muted); }
  /* NEW - register link style */
  .register-link { display: block; text-align: center; margin-top: 12px; font-size: 0.85rem; color: var(--muted); }
  .register-link a { color: var(--red); font-weight: 600; text-decoration: none; }
  .register-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="logo-area">
  <div class="logo-text">Bennett University</div>
  <div class="logo-sub">Lost &amp; Found Portal</div>
  <div class="badge">🏢 STAFF ACCESS</div>
</div>

<div class="login-card">
  <h2>Staff Login</h2>
  <p>Lost &amp; Found office personnel only</p>
  <div class="error-msg" id="errorMsg"></div>
  <div class="form-group">
    <label>Staff ID</label>
    <input type="text" id="staffId" placeholder="Enter staff ID" value="admin" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" value="bennett123" />
  </div>
  <button class="btn-primary" onclick="doLogin()">Sign In as Staff</button>
  <div class="divider">Default admin: admin / bennett123</div>
  <!-- NEW - Register link -->
  <div class="register-link">New staff member? <a href="staff-register.html">Register here</a></div>
</div>
<a class="back-link" href="login.html">← Back to student login</a>

<script>
  fetch('/api/session').then(r => r.json()).then(data => {
    if (data.role === 'staff') window.location.href = 'staff-dashboard.html';
  }).catch(() => {});

  function doLogin() {
    const id = document.getElementById('staffId').value.trim();
    const pw = document.getElementById('password').value.trim();
    if (!id || !pw) { showError('Please fill in all fields.'); return; }
    fetch('/api/login/staff', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'staffId=' + encodeURIComponent(id) + '&password=' + encodeURIComponent(pw)
    }).then(r => r.json()).then(data => {
      if (data.success) window.location.href = 'staff-dashboard.html';
      else showError(data.error || 'Login failed.');
    }).catch(() => showError('Server error. Try again.'));
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
